name: Build Nordan Overlay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 🛠️ PRO FIX: Explicitly grant the cloud bot permission to publish releases
permissions:
  contents: write

jobs:
  build-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust Environment
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Dependencies
        run: npm install

      - name: Compile and Build Executable
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ 
          releaseName: 'Nordan VTC Overlay v__VERSION__'
          releaseBody: 'Automated cloud build of the Nordan HUD.'
          releaseDraft: false # 🛠️ PRO FIX: Changed to false so it publishes instantly
          prerelease: false